
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Luxury Gallery with Lightbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f0f0f;
            overflow-x: hidden;
            /* ❌ Removed perspective from here so clicks work! */
        }

        /* 🔥 WORD 'GALLERY' FIXED DEAD CENTER */
        .gallery-title {
            position: absolute;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vw;
            /* Scales nicely with screen size */
            font-weight: 700;
            letter-spacing: 12px;
            color: white;
            z-index: 999;
            pointer-events: none;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* 🔥 NEW WRAPPER FOR 3D SCROLLING */
        .perspective-container {
            perspective: 2000px;
            width: 100%;
            min-height: 100vh;
            padding: 50px 0;
        }

        /* 4-COLUMN GRID (Top to Bottom) */
        .grid {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            /* ✅ Exactly 4 columns */
            grid-auto-rows: 200px;
            gap: 15px;
            padding: 20px;
            grid-auto-flow: dense;
        }

        /* IMAGE BOXES */
        .img-box {
            overflow: hidden;
            border-radius: 16px;
            transform-style: preserve-3d;
            transition: transform .2s ease-out, box-shadow .3s ease;
            cursor: pointer;
            z-index: 1;
            background: #222;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .img-box:hover {
            z-index: 10;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        /* SIZES */
        .wide {
            grid-column: span 2;
        }

        .tall {
            grid-row: span 2;
        }

        .big {
            grid-column: span 2;
            grid-row: span 2;
        }

        /* 🔥 POPUP / LIGHTBOX STYLES */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 99999;
            /* Ensures it sits over absolutely everything */
        }

        .popup img {
            max-width: 85%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 1);
            object-fit: contain;
        }

        .popup.active {
            opacity: 1;
            pointer-events: auto;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 50px;
            font-size: 45px;
            color: white;
            cursor: pointer;
            z-index: 100000;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            color: white;
            cursor: pointer;
            user-select: none;
            padding: 20px;
            transition: .2s;
            z-index: 100000;
        }

        .arrow:hover {
            transform: translateY(-50%) scale(1.1);
            color: #ccc;
        }

        .left {
            left: 30px;
        }

        .right {
            right: 30px;
        }
        /* Mobile adjustment */
        @media (max-width: 800px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <h1 class="gallery-title" id="title">GALLERY</h1>

    <div class="perspective-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="popup" id="popup">
        <span class="close" id="closeBtn">✕</span>
        <div class="arrow left" id="prev">&#10094;</div>
        <img id="popupImg">
        <div class="arrow right" id="next">&#10095;</div>
    </div>

            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/T1.jpg",
            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/Tarini%20(1).jpg",
            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/Tarini%20(2).jpg",
            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/Tarini%20(3).jpg",
            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/Tarini%20(4).jpg",
            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/Tarini%20(6).jpg",
            "https://raw.githubusercontent.com/KuruvaVamshi/Greensiri-gallery-farm/refs/heads/main/Tarini%20(7).jpg"
        ];

        const grid = document.getElementById("grid");

        /* 🔥 MERGE - FIXED ORDER (NO SHUFFLE) */
        let mixed = [];
        verticalImages.forEach(src => { mixed.push({ src: src, type: "vertical" }); });
        horizontalImages.forEach(src => { mixed.push({ src: src, type: "horizontal" }); });
        /* Removed: mixed.sort(() => Math.random() - 0.5); */

        /* 🔥 LIGHTBOX SETUP */
        const popup = document.getElementById("popup");
        const popupImg = document.getElementById("popupImg");
        const closeBtn = document.getElementById("closeBtn");
        const prev = document.getElementById("prev");
        const next = document.getElementById("next");

        let currentIndex = 0;
        let isPopupActive = false;

        /* 🔥 CREATE GRID & CLICK EVENT */
        mixed.forEach((item, index) => {
            const box = document.createElement("div");
            box.classList.add("img-box");

            if (item.type === "vertical") {
                box.classList.add("tall");
            } else {
                const r = Math.random();
                if (r > 0.8) box.classList.add("big");
                else if (r > 0.5) box.classList.add("wide");
            }

            const img = document.createElement("img");
            img.src = item.src;
            // Add a lazy loading tag for better performance
            img.loading = "lazy";

            box.appendChild(img);
            grid.appendChild(box);

            /* ✅ THE CLICK EVENT - Isolated and clean */
            box.addEventListener("click", () => {
                isPopupActive = true;
                currentIndex = index;
                popup.classList.add("active");
                popupImg.src = mixed[currentIndex].src;
            });
        });

        /* 🔥 LIGHTBOX CONTROLS */
        function closePopup() {
            popup.classList.remove("active");
            isPopupActive = false;
        }

        closeBtn.addEventListener("click", closePopup);

        next.addEventListener("click", () => {
            currentIndex++;
            if (currentIndex >= mixed.length) { currentIndex = 0; }
            popupImg.src = mixed[currentIndex].src;
        });

        prev.addEventListener("click", () => {
            currentIndex--;
            if (currentIndex < 0) { currentIndex = mixed.length - 1; }
            popupImg.src = mixed[currentIndex].src;
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") { closePopup(); }
            if (e.key === "ArrowRight") { document.getElementById("next").click(); }
            if (e.key === "ArrowLeft") { document.getElementById("prev").click(); }
        });

        popup.addEventListener("click", (e) => {
            if (e.target !== popupImg && !e.target.classList.contains("arrow") && !e.target.classList.contains("close")) {
                closePopup();
            }
        });

        /* 🔥 3D MOUSE EFFECT (Title is now ignored so it stays fixed) */
        document.addEventListener("mousemove", e => {
            if (isPopupActive) return; // Stop movement behind the popup

            const boxes = document.querySelectorAll(".img-box");
            const x = (e.clientX - window.innerWidth / 2) / window.innerWidth;
            const y = (e.clientY - window.innerHeight / 2) / window.innerHeight;

            boxes.forEach((box, i) => {
                const moveX = x * (20 + (i % 3) * 10);
                const moveY = y * (20 + (i % 3) * 10);

                box.style.transform = `
                    translateX(${moveX}px)
                    translateY(${moveY}px)
                    rotateY(${x * 10}deg)
                    rotateX(${-y * 10}deg)
                `;
            });
        });
    </script>
